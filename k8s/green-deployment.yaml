apiVersion: apps/v1
kind: Deployment

metadata:
  name: sentiment-green-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: sentiment-api
      slot: green

  template:
    metadata:
      labels:
        app: sentiment-api
        slot: green

    spec:
      containers:
      - name: sentiment-api

        image: zaibjahan200/sentiment-api:stable

        ports:
        - containerPort: 5000